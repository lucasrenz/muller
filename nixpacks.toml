[build]
# Comando para construir a aplicação
cmd = "npm run build"

[start]
# Comando para iniciar a aplicação
cmd = "npx serve dist --listen $PORT"

[environment]
# Variáveis de ambiente necessárias (adicione conforme necessário)
# NODE_ENV = "production"
PORT = "3000"

[web]
  engine = "nginx"
  root = "dist"